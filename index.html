<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#F7F0E6">
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="gabriela.">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="alternate icon" href="./icon-192.png">
  <title>gabriela.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Italiana&family=Manrope:wght@300;400;500;600;700&display=swap">
  <style>
html, body {
  margin: 0;
  padding: 0;
  background: #F7F0E6;
  -webkit-tap-highlight-color: transparent;
}

body {
  overscroll-behavior: none;
  font-family: 'Manrope', system-ui, -apple-system, sans-serif;
  color: #2D241E;
}

* { -webkit-tap-highlight-color: transparent; }

#root { min-height: 100vh; }

.loading {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #F7F0E6;
  gap: 14px; padding: 24px; text-align: center;
}
.loading-name {
  font-family: 'Italiana', 'Times New Roman', serif;
  font-size: 34px; color: #2D241E; letter-spacing: 0.04em;
}
.loading-name span { color: #9B4D5C; }
.loading-msg {
  font-family: 'Manrope', system-ui, sans-serif;
  font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
  color: #9A8B7A; font-weight: 500;
}
.loading-italic {
  font-family: 'Fraunces', Georgia, serif; font-style: italic;
  font-size: 16px; color: #5C5249; margin-top: 4px;
}
.loading-dot {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, #C4A059, transparent);
  margin: 4px 0;
}

    #update-banner {
      position: fixed; left: 16px; right: 16px; bottom: 24px; z-index: 60;
      display: flex; align-items: center; gap: 12px; justify-content: space-between;
      background: #2D241E; color: #F7F0E6; padding: 14px 16px; border-radius: 20px;
      box-shadow: 0 12px 32px rgba(45,36,30,.4); font-family: 'Manrope', sans-serif;
      animation: fadeUp .45s ease; max-width: 460px; margin: 0 auto;
    }
    #update-banner .msg { font-size: 13px; line-height: 1.35; flex: 1; }
    #update-banner button {
      background: #C4A059; color: #2D241E; border: none; border-radius: 999px;
      padding: 9px 16px; font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: .02em; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    #install-chip {
      position: fixed; left: 18px; bottom: 34px; z-index: 55;
      background: #FFFFFF; color: #9B4D5C; border: 1px solid rgba(155,77,92,.35);
      font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: .04em;
      padding: 10px 16px; border-radius: 999px; cursor: pointer;
      box-shadow: 0 6px 20px rgba(45,36,30,.18); animation: fadeUp .4s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="loading-name">gabriela<span>.</span></div>
      <div class="loading-dot"></div>
      <div class="loading-msg">Carregando</div>
      <div class="loading-italic">um momento, amor</div>
    </div>
  </div>
  <script src="./app.js"></script>
  <script>
  /* Recadinhos do Pedro quando tem atualização */
  var UPDATE_MSGS = [
    'Seu homem maravilhoso acabou de melhorar a sua vida 💛',
    'Seu marido caprichou: tem novidade nova pra você ✨',
    'Mexi aqui com carinho pra você, amor 💗',
    'Feito com amor: o app ficou ainda melhor 🌸',
    'Surpresinha nova esperando por você ✨',
    'Seu amor deixou tudo mais bonito aqui 💛',
  ];

  if ('serviceWorker' in navigator) {
    var controllerChanged = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (controllerChanged) return; controllerChanged = true; window.location.reload();
    });
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./service-worker.js').then(function (reg) {
        setInterval(function () { reg.update().catch(function () {}); }, 60000);
        if (reg.waiting && navigator.serviceWorker.controller) showUpdateBanner(reg);
        reg.addEventListener('updatefound', function () {
          var newSW = reg.installing; if (!newSW) return;
          newSW.addEventListener('statechange', function () {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) showUpdateBanner(reg);
          });
        });
      }).catch(function (err) { console.warn('SW falhou:', err); });
    });
  }
  function showUpdateBanner(reg) {
    if (document.getElementById('update-banner')) return;
    var msg = UPDATE_MSGS[Math.floor(Math.random() * UPDATE_MSGS.length)];
    var b = document.createElement('div'); b.id = 'update-banner';
    b.innerHTML = '<span class="msg">' + msg + '</span><button id="btn-reload-now">Atualizar 💛</button>';
    document.body.appendChild(b);
    document.getElementById('btn-reload-now').addEventListener('click', function () {
      if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      else window.location.reload();
    });
  }

  var deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault(); deferredInstallPrompt = e;
    if (document.getElementById('install-chip')) return;
    var chip = document.createElement('button'); chip.id = 'install-chip'; chip.textContent = '↓ Instalar app';
    chip.addEventListener('click', function () {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.then(function () { deferredInstallPrompt = null; chip.remove(); });
    });
    document.body.appendChild(chip);
  });
  window.addEventListener('appinstalled', function () { var c = document.getElementById('install-chip'); if (c) c.remove(); });
  </script>
</body>
</html>
