<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F7F0E6">
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="gabriela.">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="alternate icon" href="./icon-192.png">
  <title>gabriela.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Italiana&family=Manrope:wght@300;400;500;600;700&display=swap">
  <style>
html, body {
  margin: 0;
  padding: 0;
  background: #F7F0E6;
  -webkit-tap-highlight-color: transparent;
}

body {
  overscroll-behavior: none;
  font-family: 'Manrope', system-ui, -apple-system, sans-serif;
  color: #2D241E;
}

* { -webkit-tap-highlight-color: transparent; }

#root { min-height: 100vh; }

.loading {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #F7F0E6;
  gap: 14px; padding: 24px; text-align: center;
}
.loading-name {
  font-family: 'Italiana', 'Times New Roman', serif;
  font-size: 34px; color: #2D241E; letter-spacing: 0.04em;
}
.loading-name span { color: #9B4D5C; }
.loading-msg {
  font-family: 'Manrope', system-ui, sans-serif;
  font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
  color: #9A8B7A; font-weight: 500;
}
.loading-italic {
  font-family: 'Fraunces', Georgia, serif; font-style: italic;
  font-size: 16px; color: #5C5249; margin-top: 4px;
}
.loading-dot {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, #C4A059, transparent);
  margin: 4px 0;
}
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="loading-name">gabriela<span>.</span></div>
      <div class="loading-dot"></div>
      <div class="loading-msg">Carregando</div>
      <div class="loading-italic">um momento, amor</div>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
